appId: com.iburres.otforge
productName: OTForge
copyright: Copyright © 2026 Ian Burres

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - node_modules/**/*
  - package.json

extraMetadata:
  main: out/main/index.mjs

# Windows — NSIS installer
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: OTForge-${version}-Setup.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: OTForge

# macOS — DMG
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  artifactName: OTForge-${version}-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  title: OTForge ${version}
  window:
    width: 540
    height: 380

# Linux — AppImage
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  artifactName: OTForge-${version}.${ext}
  maintainer: Ian Burres <iburres@att.net>
  description: ICS/SCADA Security Simulator for Research and Education

# Auto-update via GitHub Releases
publish:
  provider: github
  owner: iburres
  repo: otforge
  releaseType: release
