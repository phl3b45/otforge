# nginx.conf — Meridian Process Controls company web server
#
# Minimal nginx config serving the static Meridian site on port 80.
# server_tokens intentionally left ON — a real nginx server would expose the
# version string in Server: response headers; students learn to enumerate this.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # No directory listings — only explicitly requested files are served
    autoindex off;

    # Cache static assets for one day
    location ~* \.(css|js|png|ico|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # HTML pages — no caching so scenario instructors can swap content at runtime
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
    }
}
