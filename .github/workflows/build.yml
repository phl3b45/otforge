name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Static analysis: type checking ──────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        # Both schema and orchestrator must be compiled before tsc can resolve
        # @ics-sim/schema and @ics-sim/orchestrator imports in packages/app.
        run: npm run build:packages

      - name: Type check all packages
        run: npm run typecheck

  # ── Static analysis: linting ─────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # ── Unit tests ────────────────────────────────────────────────────────────────
  # Runs Vitest against packages/orchestrator — the only package with runtime
  # logic worth unit testing (schema is type-only; app renderer tests come later).
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        # Schema dist/ must exist so workspace import resolution works at test time.
        run: npm run build:packages

      - name: Run unit tests
        run: npm test

  # ── Security scanning (runs in parallel with typecheck/lint/test) ─────────────
  # Three layers of static security analysis — none require a built app binary:
  #   1. npm audit  — known CVEs in npm dependencies (hard-fail on critical only)
  #   2. Trivy FS   — broader CVE scan + secret detection across the repo
  #   3. Semgrep    — SAST for TypeScript security anti-patterns (informational)
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # needed to upload SARIF results to GitHub Security tab
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Hard gate: fail only on critical CVEs.  High/moderate are reported but
      # do not block the pipeline until they have known fixes.
      - name: Dependency audit (npm)
        run: npm audit --audit-level=critical

      # Trivy scans package-lock.json for known CVEs and the source tree for
      # accidentally committed secrets (API keys, passwords, private keys).
      # ignore-unfixed prevents failing on CVEs that have no available patch.
      - name: Trivy — filesystem CVE and secret scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          scanners: vuln,secret
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true   # upload report even when findings exist

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      # Semgrep SAST — TypeScript security patterns and hardcoded-secret rules.
      # Informational on first rollout: findings appear in logs and as an artifact
      # but do not block the pipeline.  Tighten to hard-fail after initial triage.
      - name: Semgrep SAST scan
        run: |
          python3 -m pip install --quiet semgrep
          semgrep scan \
            --config p/typescript \
            --config p/secrets \
            --sarif \
            --output semgrep-results.sarif \
            --no-git-ignore \
            . || true
        env:
          SEMGREP_SEND_METRICS: "off"   # opt out of telemetry in CI

      - name: Upload Semgrep SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  # ── Platform builds ───────────────────────────────────────────────────────────
  # Waits for typecheck, lint, AND unit tests — all three must be green before
  # we spend runner time building installers.
  build:
    name: Build (${{ matrix.os }})
    needs: [typecheck, lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: 'ICS-Simulator-*-Setup.exe'
          - os: macos-latest
            platform: mac
            artifact: 'ICS-Simulator-*.dmg'
          - os: ubuntu-latest
            platform: linux
            artifact: 'ICS-Simulator-*.AppImage'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: npm run build:packages

      # macOS: install the codesigning certificate if secrets are available
      - name: Import macOS signing certificate
        if: matrix.platform == 'mac' && github.event_name != 'pull_request'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
            security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
            security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple: -s -k "$APPLE_KEYCHAIN_PASSWORD" build.keychain
            rm certificate.p12
          fi

      - name: Build Electron app (Windows)
        if: matrix.platform == 'win'
        run: npm run build:win --workspace=packages/app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (macOS)
        if: matrix.platform == 'mac'
        run: npm run build:mac --workspace=packages/app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux'
        run: npm run build:linux --workspace=packages/app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ics-simulator-${{ matrix.platform }}
          path: packages/app/release/${{ matrix.artifact }}
          if-no-files-found: warn
          retention-days: 7

  # ── Publish a GitHub Release when a version tag is pushed ────────────────────
  # Requires BOTH build (artifacts ready) AND security-scan (pentest gate cleared).
  release:
    name: Publish Release
    needs: [build, security-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
