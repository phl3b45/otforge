name: Build and Push Container Images

on:
  push:
    branches: [main]
    paths:
      - 'containers/**'
      - '.github/workflows/docker.yml'
  release:
    types: [published]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  OWNER: iburres

# ── Protocol and infrastructure images ────────────────────────────────────────
# Built on every push to main that touches containers/ (parallel matrix).

jobs:
  build-images:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 40

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ics-sim-modbus
            context: containers/modbus
          - image: ics-sim-dnp3
            context: containers/dnp3
          - image: ics-sim-firewall
            context: containers/firewall
          - image: ics-sim-switch
            context: containers/switch
          - image: ics-sim-router
            context: containers/router
          - image: ics-sim-suricata
            context: containers/suricata
          - image: ics-sim-zeek
            context: containers/zeek

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

# ── OpenPLC — longer timeout, separate job ────────────────────────────────────
# Building OpenPLC Runtime from source takes ~20 minutes.

  build-openplc:
    name: Build ics-sim-openplc
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Download OpenPLC Runtime source at the runner level (before Docker build).
      # BuildKit's RUN network context cannot reliably reach github.com for repo
      # archive downloads, but the GitHub Actions runner itself has full internet
      # access. We try 'master' first (historical default), then 'main' as a
      # fallback in case the repo default branch was renamed.
      - name: Download OpenPLC Runtime source
        run: |
          mkdir -p containers/openplc/openplc-src
          DOWNLOADED=0
          for BRANCH in master main; do
            echo "Trying branch: $BRANCH"
            HTTP_CODE=$(curl -sSL --write-out "%{http_code}" \
              "https://github.com/thiagoralves/OpenPLC_Runtime/archive/refs/heads/${BRANCH}.tar.gz" \
              -o /tmp/openplc.tar.gz)
            if [ "$HTTP_CODE" = "200" ] && [ -s /tmp/openplc.tar.gz ]; then
              tar -xz --strip-components=1 -C containers/openplc/openplc-src \
                -f /tmp/openplc.tar.gz
              if [ -f containers/openplc/openplc-src/install.sh ]; then
                echo "Downloaded OpenPLC Runtime from branch: $BRANCH"
                DOWNLOADED=1
                break
              fi
            else
              echo "Branch $BRANCH returned HTTP $HTTP_CODE"
            fi
            rm -f /tmp/openplc.tar.gz
          done
          if [ "$DOWNLOADED" -ne 1 ]; then
            echo "ERROR: Could not download OpenPLC Runtime source"
            exit 1
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/ics-sim-openplc
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}

      - name: Build and push ics-sim-openplc
        uses: docker/build-push-action@v6
        with:
          context: containers/openplc
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ics-sim-openplc
          cache-to: type=gha,mode=max,scope=ics-sim-openplc

# ── Attack base — Kali rolling, only on main push or release ──────────────────
# Largest image (~800MB). Built separately to avoid blocking the matrix.

  build-attack-base:
    name: Build ics-sim-attack-base
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write

    # Only build on push to main or on a tagged release (not on PRs)
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/ics-sim-attack-base
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}

      - name: Build and push ics-sim-attack-base
        uses: docker/build-push-action@v6
        with:
          context: containers/attack-base
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ics-sim-attack-base
          cache-to: type=gha,mode=max,scope=ics-sim-attack-base
