name: Build and Push Container Images

on:
  push:
    branches: [main]
    paths:
      - 'containers/**'
      - '.github/workflows/docker.yml'
  release:
    types: [published]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  OWNER: iburres

# ── Protocol and infrastructure images ────────────────────────────────────────
# Built on every push to main that touches containers/ (parallel matrix).

jobs:
  build-images:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 40

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: otforge-modbus
            context: containers/modbus
          - image: otforge-dnp3
            context: containers/dnp3
          - image: otforge-opcua
            context: containers/opcua
          - image: otforge-bacnet
            context: containers/bacnet
          - image: otforge-iec61850
            context: containers/iec61850
          - image: otforge-ethernetip
            context: containers/ethernetip
          - image: otforge-profinet
            context: containers/profinet
          - image: otforge-camera
            context: containers/camera
          - image: otforge-firewall
            context: containers/firewall
          - image: otforge-switch
            context: containers/switch
          - image: otforge-router
            context: containers/router
          - image: otforge-suricata
            context: containers/suricata
          - image: otforge-zeek
            context: containers/zeek
          # Phase 10: Siemens S7comm (port 102) and IEC 60870-5-104 (port 2404)
          # emulation via pure-Python server. One image handles both device types;
          # DEVICE_CATEGORY env var selects the protocol at startup.
          - image: otforge-conpot
            context: containers/conpot
          # Phase 11: Physics-simulated process unit — water tank, pipeline, generator,
          # generic. Exposes Modbus TCP on port 502; PROCESS_TYPE env var selects model.
          - image: otforge-process
            context: containers/process-sim
          # Phase 12: Meridian Process Controls company website — nginx serving
          # a realistic industrial automation company site for OSINT exercises.
          - image: otforge-web-company
            context: containers/web-company
          # Phase 12: Authoritative DNS server for meridian-process.com — dnsmasq
          # on Alpine. Logs all queries so students observe reconnaissance in real time.
          - image: otforge-dns
            context: containers/dns-server
          # Phase 12: Corporate mail server — open-relay SMTP (aiosmtpd on Alpine).
          # Accepts all inbound mail without authentication; logs every message so
          # students verify spear-phishing delivery in 'docker logs'.
          - image: otforge-mail
            context: containers/mail-server
          # Engineering workstation: Ubuntu 22.04 Xfce4 desktop with Wireshark, nmap,
          # and Python ICS protocol tools, served via TigerVNC + noVNC on port 6080.
          # amd64 only: dnp3-python and python-snap7 have no ARM64 wheels on PyPI.
          - image: otforge-workstation
            context: containers/workstation
            platforms: linux/amd64
          # Infrastructure images — mirrored from upstream registries so all platforms
          # are available in GHCR and students avoid Docker Hub rate limits.
          # influxdb:1.8 has no official ARM64 image; built from release tarballs here.
          - image: influxdb
            context: containers/influxdb
          # fuxa, loki, grafana, promtail: upstream images already support ARM64;
          # single-FROM Dockerfiles re-publish both variants into GHCR.
          - image: fuxa
            context: containers/fuxa
          - image: loki
            context: containers/loki
          - image: grafana
            context: containers/grafana
          - image: promtail
            context: containers/promtail

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          platforms: ${{ matrix.platforms || 'linux/amd64,linux/arm64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

# ── Container image CVE scan ─────────────────────────────────────────────────
# Scans the four security-sensitive custom images after they are built and
# pushed.  --ignore-unfixed suppresses CVEs that have no patch available in
# the upstream package repos (e.g. zero-day disclosures and CVEs under active
# embargo), so CI only fails when a fix EXISTS and we have not applied it.
# This prevents the Zeek base-image's unfixable CVEs from blocking every push
# while still catching regressions where a newly patched package goes unupgraded.

  scan-images:
    name: Trivy — scan ${{ matrix.image }}
    needs: build-images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: otforge-suricata
          - image: otforge-zeek
          - image: otforge-workstation
          - image: otforge-firewall

    steps:
      - name: Log in to GHCR (read-only pull)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4

      - name: Trivy — scan ${{ matrix.image }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.OWNER }}/${{ matrix.image }}:latest
          scan-type: image
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '1'
          format: table

# ── OpenPLC — native multi-platform build ─────────────────────────────────────
# OpenPLC Runtime is a large C++ compile (~20 min). QEMU cross-compilation times
# out at 30+ min on the ARM64 leg, so we use GitHub's native ARM64 runner instead.
# Pattern: each platform builds independently and pushes by digest; the merge job
# assembles both digests into a single multi-platform manifest list.

  build-openplc:
    name: Build otforge-openplc (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Download OpenPLC Runtime source at the runner level (before Docker build).
      # BuildKit's RUN network context cannot reliably reach github.com for repo
      # archive downloads, but the GitHub Actions runner itself has full internet
      # access. We try 'master' first (historical default), then 'main' as a
      # fallback in case the repo default branch was renamed.
      - name: Download OpenPLC Runtime source
        run: |
          mkdir -p containers/openplc/openplc-src
          DOWNLOADED=0
          for BRANCH in master main; do
            echo "Trying branch: $BRANCH"
            HTTP_CODE=$(curl -sSL --write-out "%{http_code}" \
              "https://github.com/thiagoralves/OpenPLC_v3/archive/refs/heads/${BRANCH}.tar.gz" \
              -o /tmp/openplc.tar.gz)
            if [ "$HTTP_CODE" = "200" ] && [ -s /tmp/openplc.tar.gz ]; then
              tar -xz --strip-components=1 -C containers/openplc/openplc-src \
                -f /tmp/openplc.tar.gz
              if [ -f containers/openplc/openplc-src/install.sh ]; then
                echo "Downloaded OpenPLC Runtime from branch: $BRANCH"
                DOWNLOADED=1
                break
              fi
            else
              echo "Branch $BRANCH returned HTTP $HTTP_CODE"
            fi
            rm -f /tmp/openplc.tar.gz
          done
          if [ "$DOWNLOADED" -ne 1 ]; then
            echo "ERROR: Could not download OpenPLC Runtime source"
            exit 1
          fi

      - name: Prepare platform slug
        run: echo "PLATFORM_SLUG=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> $GITHUB_ENV

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: containers/openplc
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.OWNER }}/otforge-openplc,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=otforge-openplc-${{ env.PLATFORM_SLUG }}
          cache-to: type=gha,mode=max,scope=otforge-openplc-${{ env.PLATFORM_SLUG }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-openplc-${{ env.PLATFORM_SLUG }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-openplc:
    name: Merge otforge-openplc manifest
    needs: build-openplc
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-openplc-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/otforge-openplc
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.OWNER }}/otforge-openplc@sha256:%s ' *)

# ── Attack base — Kali rolling, only on main push or release ──────────────────
# Largest image (~800MB). Built separately to avoid blocking the matrix.

  build-attack-base:
    name: Build otforge-attack-base
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write

    # Only build on push to main or on a tagged release (not on PRs)
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'release'

    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/otforge-attack-base
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}

      - name: Build and push otforge-attack-base
        uses: docker/build-push-action@v7
        with:
          context: containers/attack-base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=otforge-attack-base
          cache-to: type=gha,mode=max,scope=otforge-attack-base
