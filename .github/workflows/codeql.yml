name: CodeQL SAST

# GitHub's CodeQL engine performs deep static analysis of the TypeScript/JavaScript
# source tree.  Results appear in the repository's Security > Code scanning tab.
#
# Runs on every push and PR to main, plus a weekly scheduled scan so that new
# vulnerability signatures are applied even when the code has not changed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 02:30 UTC every Sunday — outside peak hours to reduce runner queue time
    - cron: '30 2 * * 0'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write   # required to publish findings to Security tab

    strategy:
      fail-fast: false
      matrix:
        # javascript-typescript covers both .js and .ts source files in one pass
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v4

      # Initialize the CodeQL toolchain and configure the query suite.
      # The "security-extended" suite runs more queries than the default,
      # including checks for prototype pollution, path traversal, and
      # injection vulnerabilities — all relevant to an Electron + Node.js app.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      # CodeQL auto-builds JavaScript/TypeScript — no explicit build step needed.
      - name: Auto-build
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
